apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: CLUSTER_NAME
  region: us-east-2
  version: "1.33"

vpc:
  id: VPC_ID
  subnets:
    public:
      AZ_1:
        id: PUBLIC_SUBNET_1
      AZ_2:
        id: PUBLIC_SUBNET_2
      AZ_3:
        id: PUBLIC_SUBNET_3

managedNodeGroups:
  - name: workers
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeSize: 20
    labels:
      role: worker
    tags:
      Project: EKS-Training

addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: eks-pod-identity-agent
