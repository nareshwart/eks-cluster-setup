apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: CLUSTER_NAME
  region: us-east-2
  version: "1.33"

iam:
  withOIDC: true

accessConfig:
  authenticationMode: API_AND_CONFIG_MAP

upgradePolicy:
  supportType: STANDARD

# cloudWatch:
#   clusterLogging:
#     enableTypes:
#       - api
#       - audit
#       - authenticator
#       - controllerManager
#       - scheduler

vpc:
  id: VPC_ID
  subnets:
    public:
      AZ_1:
        id: PUBLIC_SUBNET_1
      AZ_2:
        id: PUBLIC_SUBNET_2
      AZ_3:
        id: PUBLIC_SUBNET_3

managedNodeGroups:
  - name: workers
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 2
    maxSize: 3
    volumeSize: 20
    labels:
      role: worker
    tags:
      Project: EKS-Training
      Cluster: CLUSTER_NAME
      ManagedBy: eks-platform-scripts

addonsConfig:
  autoApplyPodIdentityAssociations: true

addons:
  - name: vpc-cni
    version: latest
  - name: coredns
    version: latest
  - name: kube-proxy
    version: latest
  - name: eks-pod-identity-agent
    version: latest
  - name: aws-ebs-csi-driver
    version: latest
